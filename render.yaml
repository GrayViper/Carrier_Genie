services:
  - type: web
    name: career-genie-backend
    env: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci --legacy-peer-deps
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.19.0"
      - key: JWT_SECRET
        generator: random
      - key: FRONTEND_ORIGIN
        value: https://career-genie-example.vercel.app
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_ENDPOINT
        value: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
    healthCheckPath: /ready
    port: $PORT
    instanceCount: 1
    autoDeploy: true
